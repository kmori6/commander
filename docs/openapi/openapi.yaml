openapi: 3.1.0
info:
  title: Commander Gateway API
  version: 0.1.0

paths:
  /v1/health:
    get:
      summary: Check server health
      operationId: getHealth
      responses:
        "200":
          description: Server is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /v1/sessions:
    get:
      summary: List chat sessions
      operationId: listSessions
      parameters:
        - name: limit
          in: query
          required: false
          description: Maximum number of sessions to return
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        "200":
          description: Chat sessions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListChatSessionsResponse"
        "500":
          description: Failed to list chat sessions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    post:
      summary: Create a chat session
      operationId: createSession
      responses:
        "201":
          description: Chat session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatSession"
        "500":
          description: Failed to create chat session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/sessions/{id}:
    get:
      summary: Get a chat session
      operationId: getSession
      parameters:
        - name: id
          in: path
          required: true
          description: Chat session ID
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Chat session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatSession"
        "404":
          description: Chat session not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Failed to get chat session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      summary: Delete a chat session
      operationId: deleteSession
      parameters:
        - name: id
          in: path
          required: true
          description: Chat session ID
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Chat session deleted
        "404":
          description: Chat session not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Failed to delete chat session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/sessions/{id}/messages:
    get:
      summary: List chat messages in a session
      operationId: listSessionMessages
      parameters:
        - name: id
          in: path
          required: true
          description: Chat session ID
          schema:
            type: string
            format: uuid
        - name: limit
          in: query
          required: false
          description: Maximum number of latest messages to return. If omitted, all messages are returned.
          schema:
            type: integer
            minimum: 1
      responses:
        "200":
          description: Chat messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListChatMessagesResponse"
        "404":
          description: Chat session not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Failed to list chat messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          example: ok

    ChatSession:
      type: object
      required:
        - id
        - status
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        status:
          $ref: "#/components/schemas/ChatSessionStatus"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ChatSessionStatus:
      type: string
      enum:
        - idle
        - running
        - awaiting_approval
      example: idle

    ChatSessionSummary:
      type: object
      required:
        - id
        - title
        - status
        - created_at
        - updated_at
        - message_count
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
          example: What is the best way to structure this Rust API?
        status:
          $ref: "#/components/schemas/ChatSessionStatus"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        message_count:
          type: integer
          format: int64
          minimum: 0

    ListChatSessionsResponse:
      type: object
      required:
        - sessions
      properties:
        sessions:
          type: array
          items:
            $ref: "#/components/schemas/ChatSessionSummary"

    ListChatMessagesResponse:
      type: object
      required:
        - session_id
        - messages
      properties:
        session_id:
          type: string
          format: uuid
        messages:
          type: array
          items:
            $ref: "#/components/schemas/ChatMessage"

    ChatMessage:
      oneOf:
        - $ref: "#/components/schemas/TextChatMessage"
        - $ref: "#/components/schemas/ToolCallChatMessage"
        - $ref: "#/components/schemas/ToolResultsChatMessage"
      discriminator:
        propertyName: kind
        mapping:
          text: "#/components/schemas/TextChatMessage"
          tool_call: "#/components/schemas/ToolCallChatMessage"
          tool_results: "#/components/schemas/ToolResultsChatMessage"

    TextChatMessage:
      type: object
      required:
        - id
        - role
        - kind
        - text
        - created_at
      properties:
        id:
          type: string
          format: uuid
        role:
          $ref: "#/components/schemas/ChatMessageRole"
        kind:
          type: string
          enum:
            - text
        text:
          type: string
        created_at:
          type: string
          format: date-time

    ToolCallChatMessage:
      type: object
      required:
        - id
        - role
        - kind
        - tool_calls
        - created_at
      properties:
        id:
          type: string
          format: uuid
        role:
          $ref: "#/components/schemas/ChatMessageRole"
        kind:
          type: string
          enum:
            - tool_call
        text:
          type: string
        tool_calls:
          type: array
          items:
            $ref: "#/components/schemas/ToolCall"
        created_at:
          type: string
          format: date-time

    ToolResultsChatMessage:
      type: object
      required:
        - id
        - role
        - kind
        - tool_results
        - created_at
      properties:
        id:
          type: string
          format: uuid
        role:
          $ref: "#/components/schemas/ChatMessageRole"
        kind:
          type: string
          enum:
            - tool_results
        tool_results:
          type: array
          items:
            $ref: "#/components/schemas/ToolResult"
        created_at:
          type: string
          format: date-time

    ChatMessageRole:
      type: string
      enum:
        - system
        - user
        - assistant
        - tool

    ToolCall:
      type: object
      required:
        - id
        - name
        - arguments
      properties:
        id:
          type: string
        name:
          type: string
        arguments:
          description: Tool arguments as JSON.

    ToolResult:
      type: object
      required:
        - tool_call_id
        - output
        - is_error
      properties:
        tool_call_id:
          type: string
        output:
          description: Tool output as JSON.
        is_error:
          type: boolean

    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: string
            message:
              type: string
