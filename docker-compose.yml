services:
  asr:
    image: fedirz/faster-whisper-server:latest-cuda
    ports:
      - "8000:8000"
    environment:
      - WHISPER__MODEL=mobiuslabsgmbh/faster-whisper-large-v3-turbo
      - WHISPER__INFERENCE_DEVICE=cuda
      - WHISPER__BEAM_SIZE=5
      - WHISPER__VAD_FILTER=true
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  postgres:
    image: pgvector/pgvector:pg18-trixie
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: example
    volumes:
      - postgres_data:/var/lib/postgresql

  flyway-admin:
    image: flyway/flyway:12.4
    depends_on:
      - postgres
    volumes:
      - ./db/migrations/admin:/flyway/sql
    environment:
      FLYWAY_URL: jdbc:postgresql://postgres:5432/postgres
      FLYWAY_USER: postgres
      FLYWAY_PASSWORD: example
      FLYWAY_CONNECT_RETRIES: 60
    command: migrate

  flyway-agent:
    image: flyway/flyway:12.4
    depends_on:
      postgres:
        condition: service_started
      flyway-admin:
        condition: service_completed_successfully
    volumes:
      - ./db/migrations/agent:/flyway/sql
    environment:
      FLYWAY_URL: jdbc:postgresql://postgres:5432/agent
      FLYWAY_USER: postgres
      FLYWAY_PASSWORD: example
      FLYWAY_CONNECT_RETRIES: 60
    command: migrate

volumes:
  postgres_data:
